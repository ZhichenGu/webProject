<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP8266 远程控制</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 1rem; font-weight: 500; color: #999; letter-spacing: 0.06em; text-transform: uppercase; }
    .config-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .config-card h2 { font-size: 0.75rem; font-weight: 500; color: #bbb; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
    .field { display: flex; align-items: center; gap: 10px; }
    .field label { font-size: 0.8rem; color: #888; width: 72px; flex-shrink: 0; }
    .field input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.85rem;
      color: #333;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #aaa; background: #fff; }
    .field input[type="password"] { letter-spacing: 0.15em; }
    #connectBtn {
      width: 100%; padding: 8px; border-radius: 8px;
      border: 1px solid #ddd; background: #1a1a1a; color: #fff;
      font-size: 0.85rem; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s; margin-top: 4px;
    }
    #connectBtn:hover { opacity: 0.85; }
    #connectBtn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
    .dot-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
    .dot.connecting { background: #f0ad4e; animation: pulse 1s infinite; }
    .dot.connected  { background: #5cb85c; }
    .dot.error      { background: #d9534f; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .dot-label { font-size: 0.8rem; color: #999; }
    #btn {
      width: 180px; height: 180px; border-radius: 50%;
      border: 1px solid #e0e0e0; cursor: pointer;
      font-size: 1rem; font-weight: 500;
      background: #fff; color: #555;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s, color 0.15s;
      user-select: none; -webkit-user-select: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    #btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn.pressed {
      background: #1a1a1a; color: #fff; border-color: transparent;
      transform: scale(0.94); box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }
    .status { font-size: 0.78rem; color: #ccc; height: 1.1em; transition: color 0.2s; }
    .status.ok  { color: #5cb85c; }
    .status.err { color: #d9534f; }
  </style>
</head>
<body>
  <h1>ESP8266 Remote</h1>
  <div class="config-card">
    <h2>HiveMQ 配置</h2>
    <div class="field">
      <label>Broker</label>
      <input id="cfgHost" type="text" placeholder="xxxx.s1.eu.hivemq.cloud" />
    </div>
    <div class="field">
      <label>用户名</label>
      <input id="cfgUser" type="text" placeholder="your_username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input id="cfgPass" type="password" placeholder="your_password" />
    </div>
    <div class="dot-row" style="margin-top:4px;">
      <div class="dot" id="dot"></div>
      <span class="dot-label" id="connLabel">未连接</span>
    </div>
    <button id="connectBtn">连接</button>
  </div>
  <button id="btn" disabled>按住</button>
  <div class="status" id="status">请先连接 MQTT</div>
  <script>
    const TOPIC = 'button/state';
    let client = null;
    const dot       = document.getElementById('dot');
    const connLabel = document.getElementById('connLabel');
    const connectBtn= document.getElementById('connectBtn');
    const btn       = document.getElementById('btn');
    const status    = document.getElementById('status');

    function setDot(state, label) { dot.className = 'dot ' + state; connLabel.textContent = label; }
    function setStatus(msg, cls) { status.textContent = msg; status.className = 'status ' + (cls||''); }

    connectBtn.addEventListener('click', () => {
      const host = document.getElementById('cfgHost').value.trim();
      const user = document.getElementById('cfgUser').value.trim();
      const pass = document.getElementById('cfgPass').value.trim();
      if (!host || !user || !pass) { setStatus('请填写全部配置信息', 'err'); return; }
      if (client) { client.end(true); client = null; }
      setDot('connecting', '连接中…');
      connectBtn.disabled = true;
      btn.disabled = true;
      client = mqtt.connect('wss://' + host + ':8884/mqtt', {
        username: user, password: pass,
        clientId: 'web-' + Math.random().toString(16).slice(2,8),
        reconnectPeriod: 0,
      });
      client.on('connect', () => {
        setDot('connected', '已连接');
        connectBtn.textContent = '重新连接';
        connectBtn.disabled = false;
        btn.disabled = false;
        setStatus('已就绪，按住按钮发送信号');
      });
      client.on('error', (err) => {
        setDot('error', '连接失败');
        connectBtn.disabled = false;
        btn.disabled = true;
        setStatus('错误：' + err.message, 'err');
      });
      client.on('close', () => {
        if (dot.classList.contains('connected')) {
          setDot('error', '已断开');
          btn.disabled = true;
          connectBtn.disabled = false;
          setStatus('连接已断开', 'err');
        }
      });
    });

    function publish(val) {
      if (!client || !client.connected) return;
      client.publish(TOPIC, val, { qos: 1 });
      setStatus(val === '1' ? '已发送 → Serial: 1 (按下)' : '已发送 → Serial: 0 (松开)', 'ok');
    }

    btn.addEventListener('mousedown',  () => { btn.classList.add('pressed');    publish('1'); });
    btn.addEventListener('mouseup',    () => { btn.classList.remove('pressed'); publish('0'); });
    btn.addEventListener('mouseleave', () => { if(btn.classList.contains('pressed')){ btn.classList.remove('pressed'); publish('0'); }});
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); btn.classList.add('pressed');    publish('1'); }, { passive: false });
    btn.addEventListener('touchend',   (e) => { e.preventDefault(); btn.classList.remove('pressed'); publish('0'); }, { passive: false });
  </script>
</body>
</html>
